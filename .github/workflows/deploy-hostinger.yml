name: Deploy para Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Baixar HTML do servidor FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" ftp://$FTP_HOST << 'FTPEOF'
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            cd public_html
            get index.html -o index.html
            bye
          FTPEOF
          echo "✓ index.html baixado"

      - name: Modificar HTML (player + checkouts)
        run: |
          python3 scripts/modify_html.py index.html index.html
          echo "✓ HTML modificado"

      - name: Upload HTML modificado para Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" ftp://$FTP_HOST << 'FTPEOF'
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            cd public_html
            put index.html
            bye
          FTPEOF
          echo "✓ Upload concluído para Hostinger"
