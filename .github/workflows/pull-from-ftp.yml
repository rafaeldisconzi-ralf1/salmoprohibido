name: Puxar HTML do Hostinger

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Listar e baixar arquivos HTML do Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          mkdir -p site
          lftp -u "$FTP_USER","$FTP_PASS" ftp://$FTP_HOST << 'EOF'
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            cd public_html
            cls -1
            mirror --verbose --include-glob="*.html" --include-glob="*.htm" --include-glob="*.php" . site/
            bye
          EOF
          echo "✓ Arquivos baixados:"
          ls -la site/

      - name: Aplicar modificações nos HTMLs
        run: |
          for f in site/*.html site/*.htm; do
            [ -f "$f" ] && python3 scripts/modify_html.py "$f" "$f" && echo "✓ Modificado: $f"
          done

      - name: Commit e push dos HTMLs atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp site/*.html . 2>/dev/null || true
          cp site/*.htm . 2>/dev/null || true
          git add *.html *.htm 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: importa e atualiza HTMLs do servidor"
          git push origin main
          echo "✓ HTMLs commitados no repositório"
