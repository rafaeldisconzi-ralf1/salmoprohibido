name: Puxar HTML do Hostinger

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Listar arquivos no public_html
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" ftp://$FTP_HOST << 'EOF'
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            cd public_html
            find . -maxdepth 3 -ls
            bye
          EOF

      - name: Baixar todos arquivos do public_html
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          mkdir -p site
          lftp -u "$FTP_USER","$FTP_PASS" ftp://$FTP_HOST << 'EOF'
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            mirror --verbose public_html/ site/
            bye
          EOF
          echo "✓ Arquivos baixados:"
          find site/ -type f | head -50

      - name: Aplicar modificações nos HTMLs
        run: |
          find site/ -type f \( -name "*.html" -o -name "*.htm" \) | while read f; do
            python3 scripts/modify_html.py "$f" "$f" && echo "✓ Modificado: $f"
          done

      - name: Commit e push dos arquivos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -r site/. . 2>/dev/null || true
          rm -rf site/
          git add -A
          git diff --staged --quiet || git commit -m "chore: importa e atualiza site do servidor"
          git push origin main
          echo "✓ Arquivos commitados no repositório"
