name: Puxar HTML do Hostinger

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Baixar index.html do Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" ftp://$FTP_HOST << 'EOF'
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            cd public_html
            get index.html -o index.html
            bye
          EOF
          echo "✓ index.html baixado"

      - name: Aplicar modificações no HTML
        run: |
          python3 scripts/modify_html.py index.html index.html
          echo "✓ HTML modificado"

      - name: Commit e push do HTML atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: importa e atualiza HTML do servidor"
          git push origin main
          echo "✓ HTML commitado no repositório"
