name: Deploy para Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Upload para Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          echo "Starting FTP deployment..."
          echo "FTP Host: $FTP_HOST"
          echo "FTP User: $FTP_USER"

          lftp -u "$FTP_USER","$FTP_PASS" ftp://$FTP_HOST << 'EOF'
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            set ftp:list-options -a

            echo "=== Conectando ao servidor ==="
            pwd
            ls -la

            echo "=== Listando arquivos locais antes do mirror ==="
            !ls -la

            echo "=== Executando mirror ==="
            mirror --reverse --verbose \
              --exclude .git/ \
              --exclude .github/ \
              --exclude scripts/ \
              . public_html/

            echo "=== Verificando resultado ==="
            cls -la public_html/ | head -20

            bye
          EOF

          if [ $? -eq 0 ]; then
            echo "✓ Deploy concluído com sucesso"
          else
            echo "✗ Deploy FALHOU com erro $?"
            exit 1
          fi
