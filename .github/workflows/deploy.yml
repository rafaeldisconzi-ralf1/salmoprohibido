name: Deploy para Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Upload para Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          echo "Starting FTP deployment..."

          lftp -u "$FTP_USER","$FTP_PASS" ftp://$FTP_HOST << 'EOF'
            set ssl:verify-certificate no
            set ftp:passive-mode yes

            echo "=== Limpando pasta public_html aninhada ==="
            if [ -d public_html/public_html ]; then
              echo "Encontrado public_html/public_html - removendo..."
              rm -rf public_html/public_html
            fi

            echo "=== Fazendo deploy ==="
            mirror --reverse --verbose \
              --exclude .git/ \
              --exclude .github/ \
              --exclude scripts/ \
              . public_html/

            echo "=== Verificando resultado ==="
            ls -la public_html/index.html

            bye
          EOF

          if [ $? -eq 0 ]; then
            echo "✓ Deploy concluído com sucesso"
          else
            echo "✗ Deploy FALHOU"
            exit 1
          fi
