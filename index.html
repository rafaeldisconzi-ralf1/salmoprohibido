  <script>
    var STEPS = [
      {t:'q',q:'¿Cuál es tu edad?',o:['18–24','25–34','35–44','45+']},
      {t:'q',q:'Cuando el dinero entra en tu vida, ¿qué sucede inmediatamente después?',o:['📖 Siempre aparece una prueba o un gasto inesperado','🕯 Desaparece sin que logre entender cómo','🙌 Permanece intacto, pero siento miedo de usarlo','🙏 Se multiplica de manera natural y armoniosa']},
      {t:'iq',img:'images/quiz-priest.png',q:'¿Sabías que en 1930, un sacerdote en Italia descubrió un salmo oculto que le <span class="gold">permitía conectarse con su ángel guardián y manifestar milagros para miles de personas</span>?',o:['🤩 No tengo idea de eso','😤 Ya había escuchado algo al respecto','❓ Me pregunto por qué lo ocultaron','😐 Necesito ver pruebas']},
      {t:'i',img:'images/quiz-scroll.png',txt:'La Iglesia clasificó ese salmo como <span class="gold">\'prohibido\'</span> y lo ocultó del público durante décadas. Hoy fue redescubierto.',btn:'Continuar'},
      {t:'q',q:'¿Ya intentaste la Ley de la Atracción, el pensamiento positivo o la manifestación?',o:['Sí, varias veces y NUNCA funcionó bien','Lo intenté, pero los resultados fueron temporales','Nunca lo intenté seriamente','Funcionó perfectamente para mí']},
      {t:'i',img:'images/quiz-angel.png',txt:'No es falta de fe. Algo está <span class="gold">bloqueando la conexión</span> con tu ángel guardián.',btn:'Seguir'},
      {t:'q',q:'Cuando pienso en tener mucho dinero, yo...',o:['😢 Siento que no lo merezco o que no soy capaz','😰 Me pongo ansioso(a) y tengo miedo de perderlo','😔 Me siento culpable por desearlo','😎 Sé que es mío por derecho']},
      {t:'ib',banner:'¡Tu bloqueo es espiritual. El Salmo Prohibido lo elimina!',img:'images/quiz-prayer.png',btn:'Seguir'},
      {t:'q',q:'¿Y si te dijera que una oración del salmo prohibido puede cambiar tu realidad financiera en 40 días? Tú...',o:['😁 La intentarías de inmediato','🤩 Sentirías mucha curiosidad por saber más','✨ Necesitarías entender primero cómo funciona']},
      {t:'q',q:'¿Cuál es tu mayor deseo en este momento?',o:['Pagar todas mis deudas','Tener un fondo de emergencia','Alcanzar la libertad financiera','Ayudar a mi familia']},
      {t:'i',img:'images/quiz-church-angel.png',txt:'Tu <span class="gold">ángel guardián</span> ya conoce tu necesidad.',btn:'Seguir'},
      {t:'ms',q:'Marca lo que más deseas manifestar en los próximos 30 días:',sub:'(SELECCIÓN MÚLTIPLE)',o:['Abundancia financiera','Paz interior','Alegría','Motivación','Confianza','Relaciones saludables','Propósito','Gratitud','Claridad mental','Pensamientos positivos','Salud física','Enfoque','Evolución personal','Productividad','Manifestación de deseos','Paciencia'],btn:'Seguir'},
      {t:'load',txt:'Con base en tus respuestas, estamos identificando a tu ángel guardián...'},
      {t:'vid'}
    ];

    var cur = 0;

    function pct(i) {
      return (((i+1)/STEPS.length)*100).toFixed(2);
    }

    function go() {
      var s = STEPS[cur];
      document.getElementById('qnum').textContent = (cur+1) + ' / ' + STEPS.length;
      document.getElementById('qfill').style.width = pct(cur) + '%';
      var el = document.getElementById('qcontent');
      el.className = 'step';
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';

      if(s.t === 'q') rQ(el, s);
      else if(s.t === 'i') rI(el, s);
      else if(s.t === 'iq') rIQ(el, s);
      else if(s.t === 'ib') rIB(el, s);
      else if(s.t === 'ms') rMS(el, s);
      else if(s.t === 'load') rLoad(el, s);
      else if(s.t === 'vid') rVid(el);
    }

    function next() {
      if(cur < STEPS.length - 1) {
        cur++;
        go();
        window.scrollTo(0, 0);
      }
    }

    function rQ(el, s) {
      el.innerHTML = '<h2 class="qtitle">' + s.q + '</h2><div class="opts">' +
        s.o.map(function(o) {
          return '<button class="opt">' + o + '</button>';
        }).join('') +
      '</div>';

      Array.from(el.querySelectorAll('.opt')).forEach(function(btn) {
        btn.addEventListener('click', function() {
          sel(this);
        });
      });
    }

    function sel(btn) {
      Array.from(btn.parentNode.children).forEach(function(b) {
        b.classList.remove('sel');
      });
      btn.classList.add('sel');
      setTimeout(next, 380);
    }

    function rI(el, s) {
      el.innerHTML =
        '<img class="qimg" src="' + s.img + '" alt="" loading="lazy">' +
        '<p class="itext">' + s.txt + '</p>' +
        '<button class="cta">' + s.btn + '</button>';
      el.querySelector('.cta').addEventListener('click', next);
    }

    function rIQ(el, s) {
      el.innerHTML =
        '<img class="qimg" src="' + s.img + '" alt="" loading="lazy">' +
        '<p class="itext">' + s.q + '</p>' +
        '<div class="opts">' +
          s.o.map(function(o) {
            return '<button class="opt">' + o + '</button>';
          }).join('') +
        '</div>';

      Array.from(el.querySelectorAll('.opt')).forEach(function(btn) {
        btn.addEventListener('click', function() {
          sel(this);
        });
      });
    }

    function rIB(el, s) {
      el.innerHTML =
        '<div class="banner">' + s.banner + '</div>' +
        '<img class="qimg" src="' + s.img + '" alt="" loading="lazy">' +
        '<button class="cta">' + s.btn + '</button>';
      el.querySelector('.cta').addEventListener('click', next);
    }

    function rMS(el, s) {
      el.innerHTML =
        '<h2 class="qtitle">' + s.q + '</h2>' +
        '<p style="text-align:center;font-size:11px;letter-spacing:.12em;color:#7a6a5a;margin-bottom:20px">' + s.sub + '</p>' +
        '<div class="mgrid">' +
          s.o.map(function(o) {
            return '<button class="chk"><span class="circ"></span><span>' + o + '</span></button>';
          }).join('') +
        '</div>' +
        '<button class="cta">' + s.btn + '</button>';

      Array.from(el.querySelectorAll('.chk')).forEach(function(chk) {
        chk.addEventListener('click', function() {
          this.classList.toggle('sel');
        });
      });
      el.querySelector('.cta').addEventListener('click', next);
    }

    function rLoad(el, s) {
      el.innerHTML =
        '<div class="load-wrap">' +
          '<p class="load-text">' + s.txt + '</p>' +
          '<div class="load-lbl"><span>Identificando...</span><span id="lpct">0%</span></div>' +
          '<div class="load-track"><div class="load-fill" id="lfill"></div></div>' +
        '</div>';

      var p = 0;
      var iv = setInterval(function() {
        p += Math.random() * 7 + 2;
        if(p >= 100) {
          p = 100;
          clearInterval(iv);
          setTimeout(next, 600);
        }
        document.getElementById('lpct').textContent = Math.round(p) + '%';
        document.getElementById('lfill').style.width = p + '%';
      }, 140);
    }

    function rVid(el) {
      document.querySelector('.qhdr').style.display = 'none';
      document.querySelector('.qprog').style.display = 'none';
      el.innerHTML =
        '<div class="vid-page">' +
          '<p class="vid-brand">EL SALMO PROHIBIDO</p>' +
          '<h2 class="vid-title">Tu <span class="gold">ángel guardián</span> tiene un mensaje urgente para ti.<br>Dale play para escucharlo ahora.</h2>' +
          '<vturb-smartplayer id="vid-6a5e5bbd263a6954d36693a8" style="display:block;margin:0 auto;width:100%;max-width:420px;">' +
            '<div class="vturb-player-placeholder" style="position:relative;width:100%;padding-top:178.22%;z-index:0;background:#000;border-radius:12px;"></div>' +
          '</vturb-smartplayer>' +
          '<div class="checkout-area"></div>' +
        '</div>';

      var sc = document.createElement('script');
      sc.src = 'https://scripts.converteai.net/1f606299-8601-495f-853a-fa04328be8e4/players/6a5e5bbd263a6954d36693a8/v4/player.js';
      sc.async = true;
      document.head.appendChild(sc);
    }

    go();
  </script>
