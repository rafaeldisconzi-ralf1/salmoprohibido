<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>El Salmo Prohibido</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1c0f07;
      color: #f0e6d3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #c9a55a;
      text-transform: uppercase;
    }

    .progress {
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.3);
      border-radius: 99px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #a87820, #f0c060);
      width: 7%;
      transition: width 0.3s ease;
    }

    .content {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      line-height: 1.4;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #f0e6d3;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    button:hover {
      background: rgba(201, 165, 90, 0.15);
      border-color: rgba(201, 165, 90, 0.4);
    }

    button:active {
      background: rgba(201, 165, 90, 0.2);
      border-color: #c9a55a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">El Salmo Prohibido</div>
    <div class="progress">
      <div class="progress-bar"></div>
    </div>
    <div class="content">
      <h1>¿Cuál es tu edad?</h1>
      <div class="buttons">
        <button data-step="1">18–24</button>
        <button data-step="2">25–34</button>
        <button data-step="3">35–44</button>
        <button data-step="4">45+</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Page loaded');

      const buttons = document.querySelectorAll('button');
      console.log('Found buttons:', buttons.length);

      buttons.forEach(function(btn, index) {
        console.log('Button ' + index + ':', btn.textContent);

        btn.addEventListener('click', function(e) {
          console.log('Button clicked:', this.textContent);
          alert('Você clicou em: ' + this.textContent);
        });
      });
    });
  </script>
</body>
</html>
