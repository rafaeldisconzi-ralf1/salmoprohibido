  <style>
    *,*::before,*::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {

    body {

      color: #f0e6d3;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #quiz {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 16px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #qcontent {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .qhdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .qbrand {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c9a55a;
    }

    .qnum {
      font-size: 12px;
      color: #7a6a5a;
    }

    .qprog {
      height: 6px;
      background: rgba(0,0,0,0.35);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .qfill {
      height: 100%;
      background: linear-gradient(90deg, #a87820, #f0c060);
      border-radius: 99px;
      transition: width 0.55s ease;
    }

    .step {
      animation: fi 0.3s ease both;
    }

    @keyframes fi {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .qtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 6.5vw, 30px);
      font-weight: 600;
      text-align: center;
      line-height: 1.45;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .qsub {
      font-size: 15.5px;
      color: #9a8a72;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 26px;
      padding: 0 8px;
    }

    .opts {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .opt {
      background: rgba(255,255,255,0.055);
      border: 1.5px solid rgba(255,255,255,0.11);
      border-radius: 12px;
      padding: 15px 20px;
      color: #f0e6d3;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      width: 100%;
    }

    .opt:hover {
      background: rgba(201,165,90,0.13);
      border-color: rgba(201,165,90,0.35);
    }

    .opt:active {
      background: rgba(201,165,90,0.2);
      border-color: #c9a55a;
    }

    .opt.sel {
      background: rgba(201,165,90,0.2);
      border-color: #c9a55a;
    }

    .qimg {
      width: 100%;
      max-width: 360px;
      border-radius: 16px;
      display: block;
      margin: 0 auto 22px;
      object-fit: cover;
    }

    .itext {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(19px, 5.5vw, 24px);
      font-weight: 600;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 26px;
      padding: 0 6px;
    }

    .gold {
      color: #c9a55a;
    }

    .cta {
      display: block;
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #b8882a, #f0c060);
      border: none;
      border-radius: 12px;
      color: #1c0f07;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      margin-top: 6px;
    }

    .cta:hover {
      opacity: 0.88;
    }

    .cta:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .mgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    @media(max-width: 420px) {
      .mgrid { grid-template-columns: 1fr; }
    }

    .chk {
      background: rgba(255,255,255,0.055);
      border: 1.5px solid rgba(255,255,255,0.11);
      border-radius: 10px;
      padding: 12px 14px;
      color: #f0e6d3;
      font-size: 15.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s;
      text-align: left;
      width: 100%;
    }

    .chk:hover {
      background: rgba(201,165,90,0.1);
      border-color: rgba(201,165,90,0.3);
    }

    .chk.sel {
      background: rgba(201,165,90,0.18);
      border-color: #c9a55a;
    }

    .circ {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: all 0.15s;
    }

    .chk.sel .circ {
      border-color: #c9a55a;
      background: #c9a55a;
    }

    .circ::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1c0f07;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .chk.sel .circ::after {
      opacity: 1;
    }

    .notebox {
      background: rgba(201,165,90,0.10);
      border: 1px solid rgba(201,165,90,0.35);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.6;
      color: #f0e6d3;
      margin: 4px 0 20px;
      text-align: center;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.25s ease, max-height 0.25s ease, margin 0.25s ease;
    }

    .notebox.show {
      opacity: 1;
      max-height: 200px;
      margin: 4px 0 20px;
    }

    .notebox.static {
      opacity: 1;
      max-height: 200px;
    }

    .msgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }

    .msgrid-item {
      background: rgba(255,255,255,0.055);
      border: 1.5px solid rgba(255,255,255,0.11);
      border-radius: 12px;
      padding: 22px 12px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .msgrid-item:hover {
      background: rgba(201,165,90,0.1);
      border-color: rgba(201,165,90,0.3);
    }

    .msgrid-item.sel {
      background: rgba(201,165,90,0.18);
      border-color: #c9a55a;
    }

    .msgrid-item .ic {
      font-size: 26px;
      display: block;
      margin-bottom: 8px;
    }

    .msgrid-item .lbl {
      font-size: 15.5px;
      font-weight: 500;
    }

    .cload-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }

    .cload-icon {
      font-size: 30px;
      margin-bottom: 6px;
    }

    .cload-ring {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 6px 0 28px;
    }

    .cload-ring svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .cload-ring circle {
      fill: none;
      stroke-width: 8;
    }

    .cload-bg {
      stroke: rgba(255,255,255,0.1);
    }

    .cload-fg {
      stroke: #f0c060;
      stroke-linecap: round;
    }

    .cload-pct {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 700;
      color: #f0c060;
    }

    .cload-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(19px, 5.5vw, 24px);
      font-weight: 600;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 12px;
      padding: 0 6px;
    }

    .cload-sub {
      font-size: 13px;
      color: #7a6a5a;
      text-align: center;
    }

    .result-wrap {
      text-align: center;
    }

    .result-img {
      width: 100%;
      max-width: 300px;
      border-radius: 16px;
      display: block;
      margin: 0 auto 22px;
      object-fit: cover;
    }

    .result-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: #f0e6d3;
      margin-bottom: 4px;
    }

    .result-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(38px, 11vw, 52px);
      font-weight: 700;
      color: #c9a55a;
      margin-bottom: 18px;
      letter-spacing: 0.01em;
    }

    .result-sub {
      font-size: 16px;
      color: #cbb98f;
      margin-bottom: 24px;
      line-height: 1.6;
      padding: 0 6px;
    }

    .vtease-wrap {
      text-align: center;
      padding-top: 10px;
    }

    .vtease-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(20px, 5.5vw, 28px);
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 44px;
      padding: 0 6px;
    }

    .play-btn {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: linear-gradient(135deg, #b8882a, #f0c060);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      cursor: pointer;
      animation: playPulse 1.8s infinite;
    }

    .play-btn::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 24px solid #1c0f07;
      border-top: 15px solid transparent;
      border-bottom: 15px solid transparent;
      margin-left: 8px;
    }

    @keyframes playPulse {
      0% { box-shadow: 0 0 0 0 rgba(240,192,96,0.6); }
      70% { box-shadow: 0 0 0 22px rgba(240,192,96,0); }
      100% { box-shadow: 0 0 0 0 rgba(240,192,96,0); }
    }

    .vid-page {
      text-align: center;
      padding-top: 4px;
    }

    .vid-brand {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c9a55a;
      margin-bottom: 14px;
    }

    .vid-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 26px;
    }
  </style>
</head>
<body>
  <div id="quiz">
    <div class="qhdr">
      <span class="qbrand">EL SALMO PROHIBIDO</span>
      <span class="qnum" id="qnum">1 / 11</span>
    </div>
    <div class="qprog"><div class="qfill" id="qfill"></div></div>
    <div id="qcontent"></div>
  </div>

  <script>
    var STEPS = [
      {t:'q',q:'¿Qué edad tienes?',sub:'Necesitamos esta información para identificar mejor tu ángel guardián.',o:['35 - 44 años','45 - 54 años','55 - 64 años','Prefiero no decirlo']},
      {t:'q',q:'¿Qué sucede cuando entra más dinero a tu vida?',sub:'Elige la opción que más se parece a ti.',o:['💳 Se va tan rápido como llegó','😟 Algo inesperado siempre lo detiene','😓 Me cuesta trabajo que se quede conmigo','😔 Parece que estoy bloqueada económicamente']},
      {t:'i',img:'images/03-historia.jpg',txt:'En 1930, un sacerdote italiano llamado <span class="gold">Padre Romano Ballerini</span> descubrió un antiguo salmo relacionado con los ángeles guardianes.<br><br>Lo que encontró cambió su vida para siempre.',btn:'Continuar'},
      {t:'i',img:'images/04-vaticano.jpg',txt:'<span class="gold">El Vaticano ocultó</span> este salmo durante décadas.<br><br>Solo unos pocos tuvieron acceso a él.<br><br>Hoy, ese salmo vuelve a estar disponible.',btn:'Continuar'},
      {t:'msnote',q:'¿Has probado alguna de estas formas para atraer abundancia?',sub:'(Puedes elegir más de una)',o:['Ley de Atracción','Manifestación','Pensamiento positivo','Oraciones','Todas las anteriores'],note:'✨ Entonces ya sabes que el problema nunca fue tu fe.',btn:'Continuar'},
      {t:'qnote',q:'¿Crees que mereces vivir en abundancia?',o:['✅ Sí','❓ A veces','❌ No'],note:'🔒 Tu respuesta confirma algo importante: el bloqueo nunca estuvo en Dios, sino en algo que está interfiriendo entre tú y tu ángel guardián.',btn:'Continuar'},
      {t:'iq',img:'images/07-angel.jpg',q:'¿Y si existiera una oración capaz de restaurar tu conexión con tu ángel guardián?',o:['❤️ Quiero conocerla','🔍 Tengo curiosidad','⭐ Necesito saber más']},
      {t:'msgrid',q:'¿Qué deseas atraer a tu vida en este momento?',sub:'Elige hasta 2 opciones.',max:2,o:[{ic:'🪙',lbl:'Abundancia'},{ic:'🕊️',lbl:'Paz'},{ic:'🛡️',lbl:'Protección'},{ic:'✨',lbl:'Prosperidad'}],btn:'Continuar'},
      {t:'loadc',txt:'Estamos identificando a tu ángel guardián...',sub:'Este proceso solo toma unos segundos.'},
      {t:'result',img:'images/10-miguel.jpg',label:'Tu ángel guardián es',name:'Miguel',sub:'Él está tratando de comunicarse contigo hoy.',btn:'Escuchar mi mensaje'},
      {t:'vtease',txt:'El Arcángel Miguel tiene un mensaje urgente para ti.<br>Dale play para escucharlo ahora.'}
    ];

    var cur = 0;

    function pct(i) {
      return (((i+1)/STEPS.length)*100).toFixed(2);
    }

    function go() {
      var s = STEPS[cur];
      document.getElementById('qnum').textContent = (cur+1) + ' / ' + STEPS.length;
      document.getElementById('qfill').style.width = pct(cur) + '%';
      var el = document.getElementById('qcontent');
      el.className = 'step';
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';

      if(s.t === 'q') rQ(el, s);
      else if(s.t === 'i') rI(el, s);
      else if(s.t === 'iq') rIQ(el, s);
      else if(s.t === 'msnote') rMSNote(el, s);
      else if(s.t === 'qnote') rQNote(el, s);
      else if(s.t === 'msgrid') rMSGrid(el, s);
      else if(s.t === 'loadc') rLoadC(el, s);
      else if(s.t === 'result') rResult(el, s);
      else if(s.t === 'vtease') rVTease(el, s);
    }

    function next() {
      if(cur < STEPS.length - 1) {
        cur++;
        go();
        window.scrollTo(0, 0);
      }
    }

    function rQ(el, s) {
      el.innerHTML = '<h2 class="qtitle">' + s.q + '</h2>' +
        (s.sub ? '<p class="qsub">' + s.sub + '</p>' : '') +
        '<div class="opts">' +
        s.o.map(function(o) {
          return '<button class="opt">' + o + '</button>';
        }).join('') +
      '</div>';

      Array.from(el.querySelectorAll('.opt')).forEach(function(btn) {
        btn.addEventListener('click', function() {
          sel(this);
        });
      });
    }

    function sel(btn) {
      Array.from(btn.parentNode.children).forEach(function(b) {
        b.classList.remove('sel');
      });
      btn.classList.add('sel');
      setTimeout(next, 380);
    }

    function rI(el, s) {
      el.innerHTML =
        '<img class="qimg" src="' + s.img + '" alt="" loading="lazy">' +
        '<p class="itext">' + s.txt + '</p>' +
        '<button class="cta">' + s.btn + '</button>';
      el.querySelector('.cta').addEventListener('click', next);
    }

    function rIQ(el, s) {
      el.innerHTML =
        '<img class="qimg" src="' + s.img + '" alt="" loading="lazy">' +
        '<p class="itext">' + s.q + '</p>' +
        '<div class="opts">' +
          s.o.map(function(o) {
            return '<button class="opt">' + o + '</button>';
          }).join('') +
        '</div>';

      Array.from(el.querySelectorAll('.opt')).forEach(function(btn) {
        btn.addEventListener('click', function() {
          sel(this);
        });
      });
    }

    function rMSNote(el, s) {
      el.innerHTML =
        '<h2 class="qtitle">' + s.q + '</h2>' +
        '<p class="qsub">' + s.sub + '</p>' +
        '<div class="mgrid">' +
          s.o.map(function(o) {
            return '<button class="chk"><span class="circ"></span><span>' + o + '</span></button>';
          }).join('') +
        '</div>' +
        '<div class="notebox static">' + s.note + '</div>' +
        '<button class="cta">' + s.btn + '</button>';

      Array.from(el.querySelectorAll('.chk')).forEach(function(chk) {
        chk.addEventListener('click', function() {
          this.classList.toggle('sel');
        });
      });
      el.querySelector('.cta').addEventListener('click', next);
    }

    function rQNote(el, s) {
      el.innerHTML =
        '<h2 class="qtitle">' + s.q + '</h2>' +
        '<div class="opts" style="margin-bottom:4px;">' +
          s.o.map(function(o) {
            return '<button class="opt">' + o + '</button>';
          }).join('') +
        '</div>' +
        '<div class="notebox" id="qnoteBox">' + s.note + '</div>' +
        '<button class="cta" id="qnoteCta" disabled>' + s.btn + '</button>';

      Array.from(el.querySelectorAll('.opt')).forEach(function(btn) {
        btn.addEventListener('click', function() {
          Array.from(btn.parentNode.children).forEach(function(b) {
            b.classList.remove('sel');
          });
          btn.classList.add('sel');
          document.getElementById('qnoteBox').classList.add('show');
          document.getElementById('qnoteCta').disabled = false;
        });
      });
      el.querySelector('#qnoteCta').addEventListener('click', function() {
        if(!this.disabled) next();
      });
    }

    function rMSGrid(el, s) {
      el.innerHTML =
        '<h2 class="qtitle">' + s.q + '</h2>' +
        '<p class="qsub">' + s.sub + '</p>' +
        '<div class="msgrid">' +
          s.o.map(function(o) {
            return '<button class="msgrid-item"><span class="ic">' + o.ic + '</span><span class="lbl">' + o.lbl + '</span></button>';
          }).join('') +
        '</div>' +
        '<button class="cta">' + s.btn + '</button>';

      var items = Array.from(el.querySelectorAll('.msgrid-item'));
      items.forEach(function(item) {
        item.addEventListener('click', function() {
          var selCount = el.querySelectorAll('.msgrid-item.sel').length;
          if(this.classList.contains('sel')) {
            this.classList.remove('sel');
          } else if(selCount < s.max) {
            this.classList.add('sel');
          }
        });
      });
      el.querySelector('.cta').addEventListener('click', next);
    }

    function rLoadC(el, s) {
      var circumference = 439.8;
      el.innerHTML =
        '<div class="cload-wrap">' +
          '<div class="cload-icon">👼</div>' +
          '<div class="cload-ring">' +
            '<svg viewBox="0 0 160 160">' +
              '<circle class="cload-bg" cx="80" cy="80" r="70"></circle>' +
              '<circle class="cload-fg" id="cring" cx="80" cy="80" r="70" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + circumference + '"></circle>' +
            '</svg>' +
            '<div class="cload-pct" id="cpct">0%</div>' +
          '</div>' +
          '<p class="cload-text">' + s.txt + '</p>' +
          '<p class="cload-sub">' + s.sub + '</p>' +
        '</div>';

      var p = 0;
      var iv = setInterval(function() {
        p += Math.random() * 7 + 2;
        if(p >= 100) {
          p = 100;
          clearInterval(iv);
          setTimeout(next, 600);
        }
        document.getElementById('cpct').textContent = Math.round(p) + '%';
        var offset = circumference - (circumference * p / 100);
        document.getElementById('cring').style.strokeDashoffset = offset;
      }, 140);
    }

    function rResult(el, s) {
      el.innerHTML =
        '<div class="result-wrap">' +
          '<p class="result-label">' + s.label + '</p>' +
          '<h2 class="result-name">' + s.name + '</h2>' +
          '<img class="result-img" src="' + s.img + '" alt="" loading="lazy">' +
          '<p class="result-sub">' + s.sub + '</p>' +
          '<button class="cta">' + s.btn + '</button>' +
        '</div>';
      el.querySelector('.cta').addEventListener('click', next);
    }

    function rVTease(el, s) {
      el.innerHTML =
        '<div class="vtease-wrap">' +
          '<p class="vtease-title">' + s.txt + '</p>' +
          '<div class="play-btn" id="playBtn"></div>' +
        '</div>';

      document.getElementById('playBtn').addEventListener('click', function() {
        rVidReal(el);
      });
    }

    function rVidReal(el) {
      document.querySelector('.qhdr').style.display = 'none';
      document.querySelector('.qprog').style.display = 'none';
      el.innerHTML =
        '<div class="vid-page">' +
          '<p class="vid-brand">EL SALMO PROHIBIDO</p>' +
          '<h2 class="vid-title">Tu <span class="gold">ángel guardián</span> tiene un mensaje urgente para ti.</h2>' +
          '<vturb-smartplayer id="vid-6a5e5bbd263a6954d36693a8" style="display:block;margin:0 auto;width:100%;max-width:420px;">' +
            '<div class="vturb-player-placeholder" style="position:relative;width:100%;padding-top:178.22%;z-index:0;background:#000;border-radius:12px;"></div>' +
          '</vturb-smartplayer>' +
        '</div>';

      var sc = document.createElement('script');
      sc.src = 'https://scripts.converteai.net/1f606299-8601-495f-853a-fa04328be8e4/players/6a5e5bbd263a6954d36693a8/v4/player.js';
      sc.async = true;
      document.head.appendChild(sc);
    }

    go();
  </script>
